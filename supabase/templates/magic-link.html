<!doctype html>
<html lang="en">
  <body style="margin:0;background:#f6f7f2;color:#243126;font-family:Arial,sans-serif">
    <div style="max-width:560px;margin:0 auto;padding:32px 20px">
      <div style="background:#ffffff;border:1px solid #dfe5dc;border-radius:16px;padding:32px">
        <p style="margin:0 0 8px;color:#5e725f;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase">Bloomjoy Hub</p>
        <h1 style="margin:0 0 16px;font-size:24px;line-height:1.25">Your sign-in code</h1>
        <p style="margin:0 0 20px;line-height:1.6">Enter this one-time code on the Bloomjoy sign-in screen:</p>
        <p style="margin:0 0 24px;padding:16px;border-radius:12px;background:#eef3eb;font-size:30px;font-weight:700;letter-spacing:.2em;text-align:center">{{ .Token }}</p>
        <p style="margin:0 0 24px;text-align:center">
          <a href="{{ .RedirectTo }}" style="display:inline-block;border-radius:999px;background:#3c6845;color:#ffffff;padding:12px 22px;text-decoration:none;font-weight:700">Open Bloomjoy sign-in</a>
        </p>
        <p style="margin:0;color:#68736a;font-size:13px;line-height:1.5">Opening the button does not use the code. Only entering the code on Bloomjoy Hub completes verification. If you did not request this email, ignore it.</p>
      </div>
    </div>
  </body>
</html>
