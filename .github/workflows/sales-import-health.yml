name: Sales Import Health

on:
  workflow_dispatch:
  schedule:
    - cron: '30 20 * * *'

permissions:
  contents: read

concurrency:
  group: sales-import-health
  cancel-in-progress: false

jobs:
  freshness:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      REPORTING_INGEST_URL: ${{ secrets.REPORTING_INGEST_URL }}
      REPORTING_INGEST_TOKEN: ${{ secrets.REPORTING_INGEST_TOKEN }}
      SALES_IMPORT_STALE_HOURS: '30'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check sales import freshness
        run: npm run reporting:provider-health -- --event freshness_check --stale-hours "$SALES_IMPORT_STALE_HOURS"
