name: Refund Adjustment Sync

on:
  schedule:
    # Daily private-source sync. Avoid the top of the hour because scheduled Actions can be delayed or dropped under load.
    - cron: '17 15 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Fetch and validate rows without writing review or adjustment records'
        required: false
        default: 'true'

permissions:
  contents: read

concurrency:
  group: refund-adjustment-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      REFUND_ADJUSTMENT_SYNC_URL: ${{ secrets.REFUND_ADJUSTMENT_SYNC_URL }}
      REFUND_ADJUSTMENT_SYNC_TOKEN: ${{ secrets.REFUND_ADJUSTMENT_SYNC_TOKEN }}
      REFUND_ADJUSTMENT_SYNC_ENABLED: ${{ vars.REFUND_ADJUSTMENT_SYNC_ENABLED || 'false' }}
      REFUND_ADJUSTMENT_SYNC_ROW_LIMIT: ${{ vars.REFUND_ADJUSTMENT_SYNC_ROW_LIMIT || '50' }}
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate refund adjustment fixtures
        run: npm run reporting:validate-refund-adjustments

      - name: Sync refund adjustments
        shell: bash
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "schedule" && "$REFUND_ADJUSTMENT_SYNC_ENABLED" != "true" ]]; then
            echo "Skipping scheduled refund sync because REFUND_ADJUSTMENT_SYNC_ENABLED is not true."
            exit 0
          fi

          if [[ -z "$REFUND_ADJUSTMENT_SYNC_URL" || -z "$REFUND_ADJUSTMENT_SYNC_TOKEN" ]]; then
            echo "Missing REFUND_ADJUSTMENT_SYNC_URL or REFUND_ADJUSTMENT_SYNC_TOKEN."
            exit 1
          fi

          node --input-type=module <<'NODE'
          const url = process.env.REFUND_ADJUSTMENT_SYNC_URL;
          const token = process.env.REFUND_ADJUSTMENT_SYNC_TOKEN;
          const dryRun = process.env.DRY_RUN === 'true';
          const rowLimit = Math.max(1, Math.min(Number(process.env.REFUND_ADJUSTMENT_SYNC_ROW_LIMIT || 50), 100));
          const aggregate = {
            rowsSeen: 0,
            rowsStaged: 0,
            rowsApplied: 0,
            rowsReview: 0,
            rowsDuplicate: 0,
            rowsInvalid: 0,
            rowsAmbiguous: 0,
            rowsUnmatched: 0,
            rowsUnapplied: 0,
          };
          let rowOffset = 0;
          let chunk = 0;
          let sourceRowsTotal = null;

          while (true) {
            chunk += 1;
            const response = await fetch(url, {
              method: 'POST',
              headers: {
                Authorization: `Bearer ${token}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({ dryRun, rowOffset, rowLimit }),
            });
            const raw = await response.text();
            let body = {};
            try {
              body = raw ? JSON.parse(raw) : {};
            } catch {
              body = { error: 'Refund sync returned a non-JSON response.' };
            }

            const summary = {
              chunk,
              httpStatus: response.status,
              status: body.status ?? null,
              dryRun: body.dryRun ?? null,
              reviewSource: body.reviewSource ?? null,
              sourceRowsTotal: body.sourceRowsTotal ?? null,
              rowOffset: body.rowOffset ?? rowOffset,
              rowLimit: body.rowLimit ?? rowLimit,
              hasMore: Boolean(body.hasMore),
              rowsSeen: body.rowsSeen ?? 0,
              rowsStaged: body.rowsStaged ?? 0,
              rowsApplied: body.rowsApplied ?? 0,
              rowsReview: body.rowsReview ?? 0,
              rowsDuplicate: body.rowsDuplicate ?? 0,
              rowsInvalid: body.rowsInvalid ?? 0,
              rowsAmbiguous: body.rowsAmbiguous ?? 0,
              rowsUnmatched: body.rowsUnmatched ?? 0,
              rowsUnapplied: body.rowsUnapplied ?? 0,
            };

            console.log(JSON.stringify(summary, null, 2));

            if (!response.ok || body.error || body.status === 'failed') {
              console.error(body.error || 'Refund adjustment sync failed.');
              process.exit(1);
            }

            for (const key of Object.keys(aggregate)) {
              aggregate[key] += Number(body[key] ?? 0);
            }
            sourceRowsTotal = body.sourceRowsTotal ?? sourceRowsTotal;

            if (!body.hasMore) break;

            const nextOffset = Number(body.nextRowOffset ?? rowOffset + rowLimit);
            if (!Number.isFinite(nextOffset) || nextOffset <= rowOffset) {
              console.error('Refund adjustment sync did not return a valid next row offset.');
              process.exit(1);
            }
            rowOffset = nextOffset;
          }

          console.log(JSON.stringify({
            status: 'completed',
            dryRun,
            sourceRowsTotal,
            chunks: chunk,
            ...aggregate,
          }, null, 2));
          NODE
