name: Sunze Sales Sync

on:
  schedule:
    # Daily catch-up with a rolling overlap so missed/late Sunze rows are repaired idempotently.
    - cron: '30 13 * * *'
    # Monthly safety sweep for historical gaps and missed daily workflow runs.
    - cron: '45 14 1 * *'
  workflow_dispatch:
    inputs:
      date_preset:
        description: 'Sunze date preset to export'
        required: false
        default: 'Last 7 Days'
      dry_run:
        description: 'Parse the export without sending rows to Supabase'
        required: false
        default: 'false'
      summary_machine_codes:
        description: 'Optional comma-separated Sunze machine codes to summarize in logs'
        required: false

permissions:
  contents: read

concurrency:
  group: sunze-sales-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUNZE_LOGIN_URL: ${{ secrets.SUNZE_LOGIN_URL }}
      SUNZE_REPORTING_EMAIL: ${{ secrets.SUNZE_REPORTING_EMAIL }}
      SUNZE_REPORTING_PASSWORD: ${{ secrets.SUNZE_REPORTING_PASSWORD }}
      REPORTING_INGEST_URL: ${{ secrets.REPORTING_INGEST_URL }}
      REPORTING_INGEST_TOKEN: ${{ secrets.REPORTING_INGEST_TOKEN }}
      DATE_PRESET: ${{ inputs.date_preset || '' }}
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
      GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule || '' }}
      SUMMARY_MACHINE_CODES: ${{ inputs.summary_machine_codes || '' }}
      SUNZE_EXPECTED_MACHINE_COUNT: ${{ vars.SUNZE_EXPECTED_MACHINE_COUNT || '' }}
      SUNZE_SYNC_STALE_HOURS: '30'
      SUNZE_REPORTING_TIMEZONE: America/Los_Angeles
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Validate parser fixture
        run: npm run reporting:validate-sunze-parser

      - name: Sync Sunze orders
        shell: bash
        run: |
          date_preset="$DATE_PRESET"
          if [[ -z "$date_preset" ]]; then
            if [[ "$GITHUB_EVENT_SCHEDULE" == "45 14 1 * *" ]]; then
              date_preset="Last Month"
            else
              date_preset="Last 7 Days"
            fi
          fi
          args=(--date-preset "$date_preset")
          if [[ "$DRY_RUN" == "true" ]]; then
            args+=(--dry-run)
          fi
          if [[ -n "$SUMMARY_MACHINE_CODES" ]]; then
            args+=(--summary-machine-codes "$SUMMARY_MACHINE_CODES")
          fi
          npm run reporting:sunze-sync -- "${args[@]}"

      - name: Check Sunze import freshness
        if: ${{ success() && env.DRY_RUN != 'true' }}
        run: npm run reporting:sunze-health -- --event freshness_check --stale-hours "$SUNZE_SYNC_STALE_HOURS"

      - name: Notify Sunze sync failure
        if: ${{ failure() }}
        run: >
          npm run reporting:sunze-health --
          --event failure
          --message "Sunze Sales Sync workflow failed before a completed import."
          --stale-hours "$SUNZE_SYNC_STALE_HOURS"
