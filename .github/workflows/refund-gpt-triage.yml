name: Refund GPT Triage

on:
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run human-reviewed triage or a PII-free failure-path test"
        required: true
        default: run
        type: choice
        options:
          - run
          - failure_test
      limit:
        description: "Maximum latest-message jobs to claim (1-10)"
        required: true
        default: "5"
        type: choice
        options:
          - "1"
          - "3"
          - "5"
          - "10"

permissions:
  contents: read

concurrency:
  group: refund-gpt-triage
  cancel-in-progress: false

jobs:
  triage:
    if: github.event_name == 'workflow_dispatch' || vars.REFUND_GPT_TRIAGE_SYNC_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate encrypted connection settings
        env:
          TRIAGE_URL: ${{ secrets.REFUND_GPT_TRIAGE_SYNC_URL }}
          TRIAGE_TOKEN: ${{ secrets.REFUND_GPT_TRIAGE_SYNC_TOKEN }}
        run: |
          if [ -z "$TRIAGE_URL" ] || [ -z "$TRIAGE_TOKEN" ]; then
            echo "Refund GPT triage scheduler secrets are not configured."
            exit 1
          fi

      - name: Run redacted human-reviewed refund triage
        env:
          TRIAGE_URL: ${{ secrets.REFUND_GPT_TRIAGE_SYNC_URL }}
          TRIAGE_TOKEN: ${{ secrets.REFUND_GPT_TRIAGE_SYNC_TOKEN }}
          REQUESTED_MODE: ${{ inputs.mode || 'run' }}
          REQUESTED_LIMIT: ${{ inputs.limit || '5' }}
          RUN_KEY: github:${{ github.run_id }}
        run: |
          TRIGGER="scheduled"
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            TRIGGER="manual"
          fi
          if [ "$REQUESTED_MODE" = "failure_test" ]; then
            TRIGGER="failure_test"
          fi
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $TRIAGE_TOKEN" \
            --header "Content-Type: application/json" \
            --data "{\"runKey\":\"$RUN_KEY\",\"trigger\":\"$TRIGGER\",\"limit\":$REQUESTED_LIMIT}" \
            "$TRIAGE_URL"
