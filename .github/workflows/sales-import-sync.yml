name: Sales Import Sync

on:
  schedule:
    # Daily catch-up with a rolling overlap so missed/late sales rows are repaired idempotently.
    - cron: '30 13 * * *'
    # Monthly safety sweep for historical gaps and missed daily workflow runs.
    - cron: '45 14 1 * *'
  workflow_dispatch:
    inputs:
      date_preset:
        description: 'Provider date preset to export'
        required: false
        default: 'Last 7 Days'
      dry_run:
        description: 'Parse the export without sending rows to Supabase'
        required: false
        default: 'false'
      summary_machine_codes:
        description: 'Optional comma-separated source machine codes to summarize in logs'
        required: false
      ingest_chunk_size:
        description: 'Rows per Supabase ingest request'
        required: false

permissions:
  contents: read

concurrency:
  group: sales-import-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PROVIDER_LOGIN_URL: ${{ secrets.SUNZE_LOGIN_URL }}
      PROVIDER_REPORTING_EMAIL: ${{ secrets.SUNZE_REPORTING_EMAIL }}
      PROVIDER_REPORTING_PASSWORD: ${{ secrets.SUNZE_REPORTING_PASSWORD }}
      REPORTING_INGEST_URL: ${{ secrets.REPORTING_INGEST_URL }}
      REPORTING_INGEST_TOKEN: ${{ secrets.REPORTING_INGEST_TOKEN }}
      DATE_PRESET: ${{ inputs.date_preset || '' }}
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
      GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule || '' }}
      SUMMARY_MACHINE_CODES: ${{ inputs.summary_machine_codes || '' }}
      PROVIDER_INGEST_CHUNK_SIZE: ${{ inputs.ingest_chunk_size || vars.SUNZE_INGEST_CHUNK_SIZE || '1000' }}
      PROVIDER_EXPECTED_MACHINE_COUNT: ${{ vars.SUNZE_EXPECTED_MACHINE_COUNT || '' }}
      SALES_IMPORT_STALE_HOURS: '30'
      PROVIDER_REPORTING_TIMEZONE: America/Los_Angeles
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Validate parser fixture
        run: npm run reporting:validate-provider-parser

      - name: Sync sales orders
        shell: bash
        run: |
          date_preset="$DATE_PRESET"
          if [[ -z "$date_preset" ]]; then
            if [[ "$GITHUB_EVENT_SCHEDULE" == "45 14 1 * *" ]]; then
              date_preset="Last Month"
            else
              date_preset="Last 7 Days"
            fi
          fi
          args=(--date-preset "$date_preset")
          if [[ "$DRY_RUN" == "true" ]]; then
            args+=(--dry-run)
          fi
          if [[ -n "$SUMMARY_MACHINE_CODES" ]]; then
            args+=(--summary-machine-codes "$SUMMARY_MACHINE_CODES")
          fi
          npm run reporting:provider-sync -- "${args[@]}"

      - name: Check sales import freshness
        if: ${{ success() && env.DRY_RUN != 'true' }}
        run: npm run reporting:provider-health -- --event freshness_check --stale-hours "$SALES_IMPORT_STALE_HOURS"

      - name: Notify sales import failure
        if: ${{ failure() }}
        run: >
          npm run reporting:provider-health --
          --event failure
          --message "Sales Import Sync workflow failed before a completed import."
          --stale-hours "$SALES_IMPORT_STALE_HOURS"
