name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Supabase Migration Version Check
        run: node scripts/check-supabase-migration-versions.mjs
      - name: Agent Workflow Drift Check
        run: npm run agent:validate-workflow
      - name: Refund Release Tooling Check
        run: npm run refunds:validate-release-tooling
      - name: Refund Release Manifest Check
        run: npm run refunds:release:check
      - name: Setup Deno for refund Edge Function tests
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.6.3
      - name: Refund Location Safety Check
        run: npm run refunds:validate-location-safety
      - name: Build
        run: npm run build
      - name: SEO Regression Checks
        run: npm run seo:check
      - name: Provider Parser Regression Checks
        run: npm run reporting:validate-provider-parser
      - name: Provider Diagnostic Regression Checks
        run: npm run reporting:validate-sync-diagnostics
      - name: Refund Adjustment Regression Checks
        run: npm run reporting:validate-refund-adjustments
      - name: Edge URL Allowlist Checks
        run: npm run edge-url-allowlists:check
      - name: Test
        run: npm test --if-present
      - name: Lint
        run: npm run lint --if-present
