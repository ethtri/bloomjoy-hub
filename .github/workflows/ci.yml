name: CI

on:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Supabase Migration Version Check
        run: node scripts/check-supabase-migration-versions.mjs
      - name: Build
        run: npm run build
      - name: SEO Regression Checks
        run: npm run seo:check
      - name: Sunze Parser Regression Checks
        run: npm run reporting:validate-sunze-parser
      - name: Refund Adjustment Regression Checks
        run: npm run reporting:validate-refund-adjustments
      - name: Test
        run: npm test --if-present
      - name: Lint
        run: npm run lint --if-present
